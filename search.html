<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shoplens AI Search</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="logo">shoplens</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="search.html" class="nav-link active">AI Search</a>
      <a href="trending.html" class="nav-link">Trending</a>
      <a href="about.html" class="nav-link">About</a>
    </div>
    <div class="nav-right"><button class="theme-btn" onclick="toggleTheme()">🌙</button></div>
  </nav>

  <div class="page-hero">
    <h1>Shoplens <span class="ai-text">AI</span></h1>
    <p>Search any product by name, description, quality or check if it's a scam.</p>
  </div>

  <div class="search-box">
    <div class="search-input-wrap">
      <input class="search-input" id="searchInput" placeholder="e.g. best wireless earbuds..." />
      <button class="search-submit" onclick="doSearch()">Search</button>
    </div>
  </div>

  <div class="results-grid" id="resultsGrid"></div>

  <script>
    async function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      
      const grid = document.getElementById('resultsGrid');
      grid.innerHTML = '<p style="text-align:center;padding:40px">🔍 Searching...</p>';

      try {
        // This now points to your secure Vercel backend function
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });

        const data = await res.json();
        // The backend handles the AI call and returns clean JSON
        const results = data.results; 

        grid.innerHTML = results.map(r => `
  <div class="result-card">
    ${r.image ? `<img src="${r.image}" alt="${r.name}" style="width:100%; border-radius:8px;">` : ''}
    <h3>${r.name}</h3>
    <p>${r.description}</p>
    <p style="margin-top:8px;font-size:0.8rem;color:var(--purple)">⭐ ${r.rating} • ${r.price}</p>
  </div>
`).join('');

      } catch (e) {
        grid.innerHTML = '<p style="text-align:center;padding:40px">❌ Search unavailable. Check your connection.</p>';
      }
    }
  </script>
</body>
</html>
