<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shoplens AI Search</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="sparkle s1">✦</div>
  <div class="sparkle s2">✦</div>

  <nav class="navbar">
    <div class="logo">shoplens</div>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="search.html" class="nav-link active">AI Search</a>
      <a href="trending.html" class="nav-link">Trending</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="assistant.html" class="nav-link">Assistant</a>
    </div>
    <div class="nav-right">
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</div>

  </nav>

  <div class="page-hero">
    <h1>Shoplens <span class="ai-text">AI</span></h1>
    <p>Search any product by name, description, quality or check if it's a scam — our AI finds everything for you.</p>
  </div>

  <div class="search-box">
    <div class="search-input-wrap">
      <input class="search-input" id="searchInput" placeholder="e.g. best budget wireless earbuds, is this product a scam..." />
      <button class="search-submit" onclick="doSearch()">Search</button>
    </div>
    <div class="search-tags">
      <span class="tag" onclick="quickSearch('best budget smartphones 2024')">📱 Budget Phones</span>
      <span class="tag" onclick="quickSearch('is dropshipping product scam')">⚠️ Scam Check</span>
      <span class="tag" onclick="quickSearch('best quality running shoes')">👟 Running Shoes</span>
      <span class="tag" onclick="quickSearch('top rated laptops for students')">💻 Student Laptops</span>
      <span class="tag" onclick="quickSearch('best skincare products')">✨ Skincare</span>
    </div>
  </div>

  <div class="results-grid" id="resultsGrid"></div>

  <script src="script.js"></script>
  <script>
    const API_KEY = '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';

    function quickSearch(q) {
      document.getElementById('searchInput').value = q;
      doSearch();
    }

    async function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      const grid = document.getElementById('resultsGrid');
      grid.innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">🔍 Searching...</p>';

      try {
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`,
            'HTTP-Referer': 'https://shoplens171.github.io',
            'X-Title': 'Shoplens'
          },
          body: JSON.stringify({
            model: 'google/gemma-3-27b-it:free',
            messages: [{
              role: 'user',
              content: `You are a shopping AI assistant. The user searched: "${query}". 
              Return exactly 4 product results as JSON array with this format:
              [{"name":"Product Name","description":"2 sentence description","rating":"4.5/5","price":"$XX - $XX","status":"safe OR caution OR scam","reason":"one line reason for status"}]
              Return ONLY the JSON array, nothing else.`
            }]
          })
        });
        const data = await res.json();
        const text = data.choices[0].message.content;
        const clean = text.replace(/```json|```/g, '').trim();
        const results = JSON.parse(clean);

        grid.innerHTML = results.map(r => `
          <div class="result-card">
            <h3>${r.name}</h3>
            <p>${r.description}</p>
            <p style="margin-top:8px;font-size:0.8rem;color:var(--purple)">⭐ ${r.rating} • ${r.price}</p>
            <p style="margin-top:6px;font-size:0.78rem;color:var(--muted)">${r.reason}</p>
            <span class="result-badge badge-${r.status}">${r.status === 'safe' ? '✅ Safe' : r.status === 'caution' ? '⚠️ Caution' : '🚫 Scam'}</span>
          </div>
        `).join('');
      } catch (e) {
        grid.innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">❌ Something went wrong. Try again!</p>';
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') doSearch();
    });
  </script>
</body>
</html>
