<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shoplens – Trending</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="sparkle s1">✦</div>
  <div class="sparkle s2">✦</div>

  <nav class="navbar">
    <div class="logo">shoplens</div>

    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="search.html" class="nav-link">AI Search</a>
      <a href="trending.html" class="nav-link active">Trending</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="assistant.html" class="nav-link">Assistant</a>
    </div>

    <div class="nav-right">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </nav>

  <div class="page-hero">
    <h1>What's <span class="ai-text">Trending</span></h1>
    <p>Real trending products updated automatically.</p>
  </div>

  <div id="trendingGrid">

    <section class="trend-section">
      <h2>👕 Clothing</h2>
      <div class="trend-row" id="clothing"></div>
    </section>

    <section class="trend-section">
      <h2>👟 Shoes</h2>
      <div class="trend-row" id="shoes"></div>
    </section>

    <section class="trend-section">
      <h2>💄 Beauty</h2>
      <div class="trend-row" id="beauty"></div>
    </section>

    <section class="trend-section">
      <h2>⌚ Accessories</h2>
      <div class="trend-row" id="accessories"></div>
    </section>

    <section class="trend-section">
      <h2>📱 Gadgets</h2>
      <div class="trend-row" id="gadgets"></div>
    </section>

  </div>

  <script src="script.js"></script>

    <script>
    async function loadTrending() {
      try {
        const response = await fetch("/api/trending");
        const data = await response.json(); // Data from your API

        // Map your HTML IDs (e.g., 'clothing') to the titles generated by your API (e.g., 'Clothing')
        const categoryMap = {
          'clothing': 'Clothing',
          'shoes': 'Shoes',
          'beauty': 'Beauty Products',
          'accessories': 'Accessories',
          'gadgets': 'Gadgets'
        };

        Object.keys(categoryMap).forEach(catId => {
          const container = document.getElementById(catId);
          if (!container) return;

          // Find the matching category in the API response
          const catObj = data.find(c => c.title === categoryMap[catId]);
          const products = catObj ? catObj.products : [];

          // Render the cards
          container.innerHTML = products.map(item => {
            // Remove any non-numeric characters from the price string to format it
            const numericPrice = parseFloat(item.price.replace(/[^0-9.]/g, '')) || 0;
            
            return `
              <div class="trend-card">
                ${item.image ? `
                  <img src="${item.image}" 
                       style="width:100%;height:180px;object-fit:cover;border-radius:18px;margin-bottom:15px;">
                ` : ""}
                
                <h3>${item.name}</h3>
                
                <p style="font-weight:700;margin-top:8px;">
                  ${new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(numericPrice)}
                </p>
              </div>
            `;
          }).join("");
        });

      } catch (err) {
        console.error("Error loading trends:", err);
        document.getElementById("trendingGrid").innerHTML = `
          <p style="text-align:center;color:var(--muted);padding:40px;">
            ❌ Could not load trends. Try again later.
          </p>
        `;
      }
    }

    loadTrending();
  </script>
