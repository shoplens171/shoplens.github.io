<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shoplens – Trending</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="sparkle s1">✦</div>
  <div class="sparkle s2">✦</div>

  <nav class="navbar">
    <div class="logo">shoplens</div>

    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="search.html" class="nav-link">AI Search</a>
      <a href="trending.html" class="nav-link active">Trending</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="assistant.html" class="nav-link">Assistant</a>
    </div>

    <div class="nav-right">
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </nav>

  <div class="page-hero">
    <h1>What's <span class="ai-text">Trending</span></h1>
    <p>Real trending products updated automatically.</p>
  </div>

  <div id="trendingGrid"></div>

  <script src="script.js"></script>

 <script>
async function loadTrending() {

  try {

    const response = await fetch("/api/trending");
    const data = await response.json();

    const categories = data.categories || [];

    const map = {
      Clothing: "clothing",
      Shoes: "shoes",
      "Beauty Products": "beauty",
      Accessories: "accessories",
      Gadgets: "gadgets"
    };

    categories.forEach(category => {

      const container =
        document.getElementById(
          map[category.title]
        );

      if (!container) return;

      container.innerHTML =
        category.products.map(product => `

          <div class="trend-card premium-card">

            <div class="trend-badge">
              ${product.badge}
            </div>

            <img
              src="${product.image}"
              class="trend-image"
              onerror="this.src='https://via.placeholder.com/300?text=No+Image'"
            >

            <h3>${product.name}</h3>

            <div class="trend-score">
              Trending ${product.trending_score}%
            </div>

            <div class="rating-row">
              ⭐ ${product.rating}
              (${product.reviews})
            </div>

            <div class="price-tag">
              ${product.price}
            </div>

            <div class="store-name">
              ${product.source}
            </div>

            <a
              href="${product.link}"
              target="_blank"
              class="deal-btn"
            >
              View Deal →
            </a>

          </div>

        `).join("");

    });

  } catch (err) {

    console.error(err);

    document.getElementById("trendingGrid").innerHTML = `
      <div style="
        text-align:center;
        padding:60px;
      ">
        Failed to load trending products.
      </div>
    `;
  }
}

loadTrending();
</script>
