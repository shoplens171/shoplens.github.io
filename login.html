<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/auth-ui-web@latest"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        #auth-container { width: 300px; }
    </style>
</head>
<body>

    <div id="auth-container"></div>

    <script>
        const supabase = supabase.createClient('YOUR_ACTUAL_URL_HERE', 'YOUR_ACTUAL_KEY_HERE');

        const ui = new supabase.AuthUI(supabase);
        ui.render('#auth-container', {
            providers: ['google'],
            view: 'sign_up'
        });
    </script>
</body>
</html>
