<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        input { margin: 10px; padding: 10px; width: 250px; }
        button { padding: 10px 20px; background: blue; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signUp()">Sign Up</button>

    <script>
        const supabase = supabase.createClient('YOUR_ACTUAL_URL_HERE', 'YOUR_ACTUAL_KEY_HERE');

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabase.auth.signUp({ email, password });
            
            if (error) alert(error.message);
            else alert("Check your email for confirmation!");
        }
    </script>
</body>
</html>
