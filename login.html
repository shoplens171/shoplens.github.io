<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shoplens Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      width: 320px;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #4f46e5;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Shoplens Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Login</button>

  <div class="msg" id="msg"></div>
</div>

<script>
  // ✅ SUPABASE CONFIG (YOUR DATA)
  const SUPABASE_URL = "https://udpfyqxmfbjndheshfme.supabase.co";

  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkcGZ5cXhtZmJqbmRoZXNoZm1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDY1NjMsImV4cCI6MjA5Nzc4MjU2M30.9g5CnbRzPPMXXucBgcl6CgIQOLH4d0Mp-HVp8zuC_uc";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ---------------- SIGN UP ----------------
  async function signUp() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      document.getElementById("msg").innerText = "Please fill all fields";
      return;
    }

    const { data, error } = await client.auth.signUp({
      email,
      password
    });

    if (error) {
      document.getElementById("msg").innerText = error.message;
    } else {
      document.getElementById("msg").innerText =
        "Signup successful! Check email (if confirmation is enabled).";
    }
  }

  // ---------------- LOGIN ----------------
  async function signIn() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      document.getElementById("msg").innerText = "Please fill all fields";
      return;
    }

    const { data, error } = await client.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      document.getElementById("msg").innerText = error.message;
    } else {
      document.getElementById("msg").innerText = "Login successful!";

      localStorage.setItem("user", email);

      setTimeout(() => {
        window.location.href = "index.html";
      }, 800);
    }
  }
</script>

</body>
</html>
