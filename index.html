<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shoplens – Find Anything You See</title>

  <link rel="stylesheet" href="style.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <!-- Supabase (MUST BE BEFORE JS) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- ================= LOGIN OVERLAY ================= -->
<div id="authOverlay" style="
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999999;
">

  <div style="
    width: 90%;
    max-width: 360px;
    background: #111827;
    padding: 22px;
    border-radius: 16px;
    text-align: center;
  ">

    <h2>Welcome to Shoplens</h2>
    <p style="color:#aaa;font-size:13px;">Login / Signup / Guest</p>

    <input id="email" type="email" placeholder="Email"
      style="width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none;">

    <input id="password" type="password" placeholder="Password"
      style="width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none;">

    <button onclick="login()" style="width:100%;padding:10px;margin-top:8px;background:#6366f1;color:white;border:none;border-radius:8px;">
      Login
    </button>

    <button onclick="signup()" style="width:100%;padding:10px;margin-top:8px;background:#22c55e;color:white;border:none;border-radius:8px;">
      Sign Up
    </button>

    <button onclick="guest()" style="width:100%;padding:10px;margin-top:8px;background:#444;color:white;border:none;border-radius:8px;">
      Continue as Guest
    </button>

    <p id="msg" style="color:#aaa;font-size:12px;margin-top:10px;"></p>
  </div>
</div>

<!-- ================= MAIN WEBSITE ================= -->

<nav class="navbar">
  <div class="logo">shoplens</div>

  <div class="nav-links">
    <a href="index.html" class="nav-link active">Home</a>
    <a href="search.html" class="nav-link">AI Search</a>
    <a href="trending.html" class="nav-link">Trending</a>
    <a href="about.html" class="nav-link">About</a>
    <a href="assistant.html" class="nav-link">Assistant</a>
  </div>

  <div class="nav-right">
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
</nav>

<section class="hero">
  <h1>Find anything you see with AI</h1>
  <p>Upload screenshots & get instant product matches</p>

  <div class="cta-card">
    <strong>Get Started</strong>
  </div>
</section>

<!-- ================= SCRIPTS ================= -->

<script>
const SUPABASE_URL = "https://udpfyqxmfbjndheshfme.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkcGZ5cXhtZmJqbmRoZXNoZm1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDY1NjMsImV4cCI6MjA5Nzc4MjU2M30.9g5CnbRzPPMXXucBgcl6CgIQOLH4d0Mp-HVp8zuC_uc";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ---------------- AUTH CHECK ----------------
async function checkAuth() {
  const { data: { user } } = await client.auth.getUser();
  if (user) hideOverlay();
}

checkAuth();

client.auth.onAuthStateChange((event, session) => {
  if (session) hideOverlay();
});

function hideOverlay() {
  document.getElementById("authOverlay").style.display = "none";
}

// ---------------- LOGIN ----------------
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({ email, password });

  document.getElementById("msg").innerText =
    error ? error.message : "Login successful!";

  if (!error) hideOverlay();
}

// ---------------- SIGNUP ----------------
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signUp({ email, password });

  document.getElementById("msg").innerText =
    error ? error.message : "Signup successful! Check email.";
}

// ---------------- GUEST ----------------
function guest() {
  localStorage.setItem("guest", "true");
  hideOverlay();
}
</script>

</body>
</html>
